<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMNP GOLD MEMBERSHIP SYSTEM</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="app.js"></script>

</head>

<body>

<!-- HEADER -->
<div class="header">
TMNP GOLD MEMBERSHIP SYSTEM | PERMANENT CARD
</div>

<div class="container">

<!-- LEFT FORM -->
<div class="left-panel">

<h3>Registration Form</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="voterid" placeholder="Voter ID">
<input id="email" placeholder="Gmail ID">
<input id="district" placeholder="District">

<textarea id="address" placeholder="Full Address"></textarea>

<input type="file" id="photo" accept="image/*">

<button class="btn-gold" onclick="saveMember()">
Submit Membership
</button>

<button class="btn-blue" onclick="downloadPDF()">
Download PDF
</button>

<button class="btn-green" onclick="shareWhatsApp()">
Share WhatsApp
</button>

</div>

<!-- RIGHT CARD -->
<div class="right-panel">

<div id="cardPreview"></div>

</div>

</div>

<!-- FOOTER -->
<div class="header">
N. RAMAN | President / General Secretary |
ECI Reg No: 56/219/2018-2021/PPS-I | 05.03.2021
</div>

</body>
</html>

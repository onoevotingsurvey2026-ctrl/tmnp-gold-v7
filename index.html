<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMNP GOLD SYSTEM V7</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script type="module" src="app.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="header">
  TMNP GOLD MEMBERSHIP SYSTEM
</div>

<!-- MAIN -->
<div class="container">

  <!-- LEFT FORM -->
  <div class="left-panel">

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="voterid" placeholder="Voter ID">
    <input id="email" placeholder="Email">
    <input id="district" placeholder="District">
    <input id="address" placeholder="Address">
    <input type="file" id="photo">

    <!-- ACTION BUTTONS -->
    <button class="btn-gold" onclick="saveMember()">
      Submit Membership
    </button>

    <button class="btn-blue" onclick="toggleDashboard()">
      Open Dashboard
    </button>

    <button class="btn-green" onclick="downloadPDF()">
      Download PDF
    </button>

    <button class="btn-blue" onclick="shareWhatsApp()">
      Share WhatsApp
    </button>

  </div>

  <!-- RIGHT CARD -->
  <div class="right-panel">

    <div id="cardPreview">
      <p>Fill form & submit</p>
    </div>

  </div>

</div>

<!-- DASHBOARD (HIDDEN INITIALLY) -->
<div id="dashboard" style="display:none;" class="right-panel">

  <h3>MEMBERS DASHBOARD</h3>

  <input id="search" placeholder="Search members">

  <div id="memberList"></div>

</div>

<!-- FOOTER -->
<div class="header">
  N. RAMAN | President / General Secretary | TMNP
</div>

</body>
</html>

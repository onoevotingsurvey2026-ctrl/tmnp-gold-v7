<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMNP Membership System</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
background:#0b3d91;
color:white;
padding:12px;
position:sticky;
top:0;
}

.header img{
width:60px;
height:60px;
object-fit:contain;
}

.header h2{
margin:0;
font-size:18px;
text-align:center;
}

/* MAIN */
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

/* FORM */
.form-box{
background:white;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.form-box input{
width:100%;
padding:8px;
margin:6px 0;
}

.btn{
width:100%;
padding:10px;
margin-top:8px;
background:#0b3d91;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* CARD */
.card{
width:320px;
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.card-header{
background:#0b3d91;
color:white;
padding:10px;
border-radius:10px;
font-weight:bold;
}

.profile{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid gold;
margin-top:10px;
}

.details{
text-align:left;
margin-top:10px;
font-size:14px;
line-height:1.6;
}

/* FOOTER */
.footer{
text-align:center;
background:#0b3d91;
color:white;
padding:10px;
margin-top:20px;
font-size:13px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="assets/logo.png" alt="TMNP Logo">
<h2>TMNP Membership System</h2>
</div>

<!-- MAIN -->
<div class="container">

<!-- FORM -->
<div class="form-box">
<h3>Member Registration</h3>

<input type="file" id="photoInput" accept="image/*">

<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="voter" placeholder="Voter ID">
<input type="text" id="email" placeholder="Email">
<input type="text" id="district" placeholder="District">

<button class="btn" onclick="updateCard()">Generate Card</button>
<button class="btn" onclick="downloadCard()">Download Card</button>
</div>

<!-- CARD -->
<div class="card" id="card">

<div class="card-header">
TMNP MEMBERSHIP CARD
</div>

<img id="cardPhoto" class="profile" src="assets/default.png">

<div class="details">
<b>ID:</b> <span id="c_id">TMNP-001</span><br>
<b>Name:</b> <span id="c_name"></span><br>
<b>Phone:</b> <span id="c_phone"></span><br>
<b>Voter ID:</b> <span id="c_voter"></span><br>
<b>Email:</b> <span id="c_email"></span><br>
<b>District:</b> <span id="c_district"></span><br>
<b>Date:</b> <span id="c_date"></span>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 TMNP Membership System | All Rights Reserved
</div>

<script>

let memberCount = 1;

// PHOTO
document.getElementById("photoInput").addEventListener("change", function(e){
const reader = new FileReader();
reader.onload = function(){
document.getElementById("cardPhoto").src = reader.result;
}
reader.readAsDataURL(e.target.files[0]);
});

// UPDATE
function updateCard(){

document.getElementById("c_name").innerText = document.getElementById("name").value;
document.getElementById("c_phone").innerText = document.getElementById("phone").value;
document.getElementById("c_voter").innerText = document.getElementById("voter").value;
document.getElementById("c_email").innerText = document.getElementById("email").value;
document.getElementById("c_district").innerText = document.getElementById("district").value;

let now = new Date();
document.getElementById("c_date").innerText = now.toLocaleString();

document.getElementById("c_id").innerText = "TMNP-" + (1000 + memberCount);
memberCount++;
}

// DOWNLOAD
function downloadCard(){
html2canvas(document.getElementById("card")).then(canvas=>{
let link = document.createElement("a");
link.download = "TMNP_Membership_Card.png";
link.href = canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>

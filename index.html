<h2>TMNP GOLD MEMBERSHIP REGISTRATION</h2>

<div class="container">

```
<!-- REGISTRATION FORM -->

<div class="form-box">

    <input
        type="text"
        id="name"
        placeholder="Full Name"
    >

    <input
        type="text"
        id="phone"
        placeholder="Phone Number"
    >

    <input
        type="text"
        id="voterid"
        placeholder="Voter ID"
    >

    <input
        type="email"
        id="email"
        placeholder="Email Address"
    >

    <input
        type="text"
        id="district"
        placeholder="District"
    >

    <input
        type="text"
        id="address"
        placeholder="Address"
    >

    <input
        type="file"
        id="photo"
        accept="image/*"
    >

    <button onclick="saveMember()">
        Submit Membership
    </button>

</div>

<!-- CARD PREVIEW -->

<div class="card-box">

    <div id="cardPreview">

        <div class="card">

            <div class="card-header">
                TMNP GOLD MEMBERSHIP CARD
            </div>

            <div class="card-body">

                <p>
                    Fill the form and click
                    Submit Membership
                </p>

            </div>

        </div>

    </div>

</div>

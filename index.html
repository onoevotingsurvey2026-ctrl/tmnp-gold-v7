<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMNP Membership Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#1e3c72,#2a5298);
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

/* DASHBOARD */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
margin:0 0 10px 0;
font-size:14px;
}

/* COLORS */
.name{border-left:5px solid #ff5722;}
.phone{border-left:5px solid #4caf50;}
.email{border-left:5px solid #2196f3;}
.voter{border-left:5px solid #9c27b0;}
.address{border-left:5px solid #ff9800;}

/* INPUT */
input, textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

/* BUTTONS */
button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-submit{background:#1976d2;color:white;width:100%;}
.btn-card{background:#4caf50;color:white;margin-top:5px;width:100%;}
.btn-download{background:#ff5722;color:white;margin-top:5px;width:100%;}

/* CARD OUTPUT */
#memberCard{
width:320px;
background:linear-gradient(135deg,#ffffff,#e3f2fd);
padding:15px;
border-radius:12px;
margin:20px auto;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
display:none;
}

#memberCard h2{
text-align:center;
margin:0;
color:#1e3c72;
}

#memberList{
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
font-size:13px;
}

th{
background:#1e3c72;
color:white;
}
</style>
</head>

<body>

<div class="header">
TAMILNADU MAKKAL NALVAZHVU PERIYAKKAM - MEMBERSHIP DASHBOARD
</div>

<!-- FORM -->
<div class="container">

<div class="card name">
<h3>Name</h3>
<input id="name">
</div>

<div class="card phone">
<h3>Phone</h3>
<input id="phone">
</div>

<div class="card email">
<h3>Email</h3>
<input id="email">
</div>

<div class="card voter">
<h3>Voter ID</h3>
<input id="voter">
</div>

<div class="card address">
<h3>Address</h3>
<textarea id="address"></textarea>
</div>

</div>

<div style="padding:15px;">
<button class="btn-submit" onclick="submitMember()">SUBMIT MEMBER</button>
<button class="btn-card" onclick="generateCard()">GENERATE CARD</button>
<button class="btn-download" onclick="downloadCard()">DOWNLOAD CARD</button>
</div>

<!-- CARD -->
<div id="memberCard">
<h2>TMNP MEMBER CARD</h2>
<hr>
<p><b>Name:</b> <span id="c_name"></span></p>
<p><b>Phone:</b> <span id="c_phone"></span></p>
<p><b>Email:</b> <span id="c_email"></span></p>
<p><b>Voter ID:</b> <span id="c_voter"></span></p>
<p><b>Address:</b> <span id="c_address"></span></p>
</div>

<!-- ADMIN PANEL -->
<div id="memberList">
<h3 style="padding-left:15px;">ADMIN DASHBOARD</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Voter ID</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>

let members=[];

function submitMember(){

let m={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
voter:document.getElementById("voter").value,
address:document.getElementById("address").value
};

members.push(m);
updateTable();

alert("Member Added Successfully!");
}

function updateTable(){

let row="";
members.forEach(m=>{
row+=`
<tr>
<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.email}</td>
<td>${m.voter}</td>
</tr>`;
});

document.getElementById("tableBody").innerHTML=row;
}

function generateCard(){

let last=members[members.length-1];

if(!last){alert("No Member Data");return;}

document.getElementById("memberCard").style.display="block";

document.getElementById("c_name").innerText=last.name;
document.getElementById("c_phone").innerText=last.phone;
document.getElementById("c_email").innerText=last.email;
document.getElementById("c_voter").innerText=last.voter;
document.getElementById("c_address").innerText=last.address;
}

function downloadCard(){

html2canvas(document.getElementById("memberCard")).then(canvas=>{
let link=document.createElement("a");
link.download="TMNP_Member_Card.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
</html>

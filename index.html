<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMNP Membership System V10</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#0d47a1,#1976d2);
color:white;
text-align:center;
padding:15px;
font-weight:bold;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
}

/* FOOTER */
.footer{
background:#0d47a1;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}

/* DASHBOARD GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* COLORS */
.name{border-left:5px solid #ff5722;}
.phone{border-left:5px solid #4caf50;}
.email{border-left:5px solid #2196f3;}
.voter{border-left:5px solid #9c27b0;}
.address{border-left:5px solid #ff9800;}
.photo{border-left:5px solid #e91e63;}

/* INPUT */
input, textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

/* BUTTONS */
button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.btn1{background:#1976d2;color:white;}
.btn2{background:#4caf50;color:white;}
.btn3{background:#ff5722;color:white;}

/* CARD */
#memberCard{
width:340px;
background:linear-gradient(135deg,#ffffff,#e3f2fd);
margin:20px auto;
padding:15px;
border-radius:12px;
display:none;
box-shadow:0 3px 12px rgba(0,0,0,0.3);
}

#memberCard img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
}

#memberList table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
font-size:13px;
}

th{
background:#0d47a1;
color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="assets/logo.png" class="logo"><br>
TAMILNADU MAKKAL NALVAZHVU PERIYAKKAM<br>
<span style="font-size:12px;">MEMBERSHIP SYSTEM V10</span><br>
<button onclick="getLocation()">📍 Get Location</button>
<p id="loc"></p>
</div>

<!-- FORM -->
<div class="container">

<div class="card name">
Name
<input id="name">
</div>

<div class="card phone">
Phone
<input id="phone">
</div>

<div class="card email">
Email
<input id="email">
</div>

<div class="card voter">
Voter ID
<input id="voter">
</div>

<div class="card address">
Address
<textarea id="address"></textarea>
</div>

<div class="card photo">
Photo Upload
<input type="file" id="photo" onchange="loadPhoto(event)">
</div>

</div>

<!-- BUTTONS -->
<div style="text-align:center;">
<button class="btn1" onclick="submitMember()">SUBMIT</button>
<button class="btn2" onclick="generateCard()">GENERATE CARD</button>
<button class="btn3" onclick="downloadCard()">DOWNLOAD</button>
</div>

<!-- CARD -->
<div id="memberCard">
<h3 style="text-align:center;">TMNP MEMBER CARD</h3>
<img id="cardPhoto">
<p><b>Name:</b> <span id="c_name"></span></p>
<p><b>Phone:</b> <span id="c_phone"></span></p>
<p><b>Email:</b> <span id="c_email"></span></p>
<p><b>Voter ID:</b> <span id="c_voter"></span></p>
<p><b>Address:</b> <span id="c_address"></span></p>
<p><b>Location:</b> <span id="c_location"></span></p>
</div>

<!-- ADMIN -->
<div id="memberList">
<h3 style="padding:10px;">ADMIN DASHBOARD</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Voter ID</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- FOOTER -->
<div class="footer">
© TMNP Membership System - All Rights Reserved
</div>

<script>

let members=[];
let photoData="";

function loadPhoto(event){
let reader=new FileReader();
reader.onload=function(){
photoData=reader.result;
}
reader.readAsDataURL(event.target.files[0]);
}

function submitMember(){

let m={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
voter:document.getElementById("voter").value,
address:document.getElementById("address").value,
photo:photoData,
location:document.getElementById("loc").innerText
};

members.push(m);
updateTable();

alert("Member Added!");
}

function updateTable(){
let row="";
members.forEach(m=>{
row+=`
<tr>
<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.email}</td>
<td>${m.voter}</td>
</tr>`;
});
document.getElementById("tableBody").innerHTML=row;
}

function generateCard(){
let m=members[members.length-1];
if(!m){alert("No Data");return;}

document.getElementById("memberCard").style.display="block";

document.getElementById("c_name").innerText=m.name;
document.getElementById("c_phone").innerText=m.phone;
document.getElementById("c_email").innerText=m.email;
document.getElementById("c_voter").innerText=m.voter;
document.getElementById("c_address").innerText=m.address;
document.getElementById("c_location").innerText=m.location;

document.getElementById("cardPhoto").src=m.photo;
}

function downloadCard(){
html2canvas(document.getElementById("memberCard")).then(canvas=>{
let a=document.createElement("a");
a.download="TMNP_CARD.png";
a.href=canvas.toDataURL();
a.click();
});
}

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("loc").innerText=
pos.coords.latitude+","+pos.coords.longitude;
});
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMNP Member Verification</title>

<link rel="stylesheet" href="style.css">

<style>
.verify-box{
    max-width:500px;
    margin:50px auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.15);
}

.success{
    color:green;
    font-weight:bold;
    font-size:20px;
}

.fail{
    color:red;
    font-weight:bold;
    font-size:20px;
}

.verify-title{
    text-align:center;
    margin-bottom:20px;
}

.member-info{
    margin-top:15px;
    line-height:1.8;
}
</style>

</head>
<body>

<div class="verify-box">

    <div class="verify-title">
        <h2>TMNP MEMBER VERIFICATION</h2>
        <p>தமிழ்நாடு மக்கள் நல்வாழ்வு பேரியக்கம்</p>
    </div>

    <div id="result">
        Loading Verification...
    </div>

</div>

<script type="module">

import { db } from "./firebase-config.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

const resultDiv = document.getElementById("result");

if(!id){

    resultDiv.innerHTML = `
    <div class="fail">
        INVALID QR CODE
    </div>
    `;

}else{

    try{

        const snap = await getDoc(
            doc(db,"members",id)
        );

        if(snap.exists()){

            const d = snap.data();

            resultDiv.innerHTML = `

            <div class="success">
            ✅ VERIFIED MEMBER
            </div>

            <div class="member-info">

                <p><b>Member ID:</b> ${d.memberId || "-"}</p>

                <p><b>Name:</b> ${d.name || "-"}</p>

                <p><b>Phone:</b> ${d.phone || "-"}</p>

                <p><b>District:</b> ${d.district || "-"}</p>

                <p><b>Status:</b> ${d.status || "Active"}</p>

            </div>

            `;

        }else{

            resultDiv.innerHTML = `
            <div class="fail">
            ❌ MEMBER NOT FOUND
            </div>
            `;

        }

    }catch(error){

        console.error(error);

        resultDiv.innerHTML = `
        <div class="fail">
        Verification Failed
        </div>
        `;

    }

}

</script>

</body>
</html>
